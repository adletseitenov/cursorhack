<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Поводырь</title>
<style>
  body { font-family: system-ui, sans-serif; margin: 0; padding: 12px; background: #111; color: #eee; }
  video { width: 100%; max-width: 480px; background: #000; border-radius: 8px; }
  button { font-size: 18px; padding: 12px 20px; margin: 8px 8px 8px 0; border-radius: 8px; border: none; background: #2b6; color: #fff; }
  button:disabled { background: #555; }
  button.stop { background: #d43; }
  input { font-size: 16px; padding: 8px; border-radius: 6px; border: 1px solid #444; background: #222; color: #eee; width: 100%; max-width: 460px; box-sizing: border-box; }
  #bigCmd { font-size: 28px; font-weight: 700; min-height: 40px; margin: 8px 0; color: #6f6; }
  #judge { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 10px; }
  #lastFrame { width: 200px; border-radius: 6px; background: #000; }
  #log { font-size: 14px; line-height: 1.5; flex: 1; min-width: 250px; max-height: 320px; overflow-y: auto; }
  #log div { border-bottom: 1px solid #333; padding: 3px 0; }
  .lat { color: #8cf; }
  .err { color: #f66; }
  .haz { color: #fa0; font-weight: 700; }
  label { font-size: 14px; color: #aaa; display: block; margin-top: 8px; }
</style>
</head>
<body>
<h3 style="margin:4px 0">Поводырь</h3>
<video id="cam" playsinline autoplay muted></video>
<label>Цель:</label>
<input id="goal" value="бутылка воды на столе">
<div>
  <button id="btnStart">Старт камеры</button>
  <button id="btnNav" disabled>Навигация</button>
  <button id="btnShot" disabled>Один кадр</button>
  <button id="btnShootout" disabled>Шутаут</button>
</div>
<div id="bigCmd"></div>
<div id="status"></div>
<!-- Judge view: что «видит» и «думает» модель -->
<div id="judge">
  <img id="lastFrame" alt="">
  <div id="log"></div>
</div>

<script>
// ===== КОНФИГ =====
const OPENROUTER_KEY = ""; // ключ сюда; если пусто — страница спросит один раз и сохранит в localStorage
const MODEL = "qwen/qwen3-vl-8b-instruct"; // дефолт до шутаута M2
const SHOOTOUT_MODELS = [
  "qwen/qwen3-vl-8b-instruct",
  "z-ai/glm-4.6v",
  "anthropic/claude-haiku-4.5",
];
const TICK_MS = 300; // пауза между ответом и следующим кадром (рычаг M4)

function getKey() {
  if (OPENROUTER_KEY) return OPENROUTER_KEY;
  let k = localStorage.getItem("orkey");
  if (!k) {
    k = prompt("OpenRouter API key:");
    if (k) localStorage.setItem("orkey", k.trim());
  }
  return k;
}

const cam = document.getElementById("cam");
const logEl = document.getElementById("log");
const statusEl = document.getElementById("status");
const bigCmd = document.getElementById("bigCmd");
const lastFrameEl = document.getElementById("lastFrame");

function log(msg, cls) {
  const d = document.createElement("div");
  if (cls) d.className = cls;
  d.textContent = msg;
  logEl.prepend(d);
}

// ===== КАМЕРА =====
document.getElementById("btnStart").onclick = async () => {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: "environment", width: { ideal: 1280 } },
      audio: false,
    });
    cam.srcObject = stream;
    for (const id of ["btnNav", "btnShot", "btnShootout"]) document.getElementById(id).disabled = false;
    speak("Камера включена");
    log("Камера запущена");
  } catch (e) {
    log("Ошибка камеры: " + e.message, "err");
  }
};

// ===== КАДР: downscale 768px, JPEG 0.6, data-URI =====
function captureFrame() {
  const w = 768;
  const h = Math.round(cam.videoHeight * (w / cam.videoWidth));
  const c = document.createElement("canvas");
  c.width = w; c.height = h;
  c.getContext("2d").drawImage(cam, 0, 0, w, h);
  return c.toDataURL("image/jpeg", 0.6);
}

// ===== ГОЛОС =====
function speak(text) {
  try {
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = "ru-RU";
    u.rate = 1.2;
    speechSynthesis.speak(u);
  } catch (e) { /* нет TTS — молчим */ }
}

// ===== ВИБРАЦИЯ (iOS не умеет — молча пропускаем) =====
const VIBES = {
  hazard: [100, 50, 100, 50, 100],
  left: [80],
  right: [80, 60, 80],
  forward: [40],
};
function vibrate(dir, hazard) {
  try {
    if (!navigator.vibrate) return;
    navigator.vibrate(hazard ? VIBES.hazard : (VIBES[dir] || []));
  } catch (e) {}
}

// ===== VLM-ЗАПРОС =====
let history = []; // последние 3 инструкции — против осцилляции лево/право

function systemPrompt() {
  const goal = document.getElementById("goal").value || "бутылка воды на столе";
  return `Ты — навигатор для незрячего человека. Телефон у него на груди, камера смотрит вперёд. ` +
    `Цель: ${goal}. Дай ОДНУ команду по-русски, максимум 8 слов: направление и число шагов. ` +
    `Препятствия на пути — предупреждай В ПЕРВУЮ ОЧЕРЕДЬ. Не повторяй предыдущую команду без необходимости. ` +
    `Когда цель в полуметре — arrived: true. ` +
    `Отвечай ТОЛЬКО JSON: {"instruction": string, "direction": "forward"|"left"|"right"|"stop", "hazard": bool, "arrived": bool}`;
}

async function askVLM(dataUri, model) {
  const t0 = performance.now();
  const histText = history.length ? ` Предыдущие команды (свежие последними): ${history.join("; ")}.` : "";
  const resp = await fetch("https://openrouter.ai/api/v1/chat/completions", {
    method: "POST",
    headers: {
      "Authorization": "Bearer " + getKey(),
      "Content-Type": "application/json",
    },
    body: JSON.stringify({
      model: model,
      response_format: { type: "json_object" },
      max_tokens: 100,
      messages: [
        { role: "system", content: systemPrompt() },
        { role: "user", content: [
          { type: "text", text: "Кадр с камеры. Команда?" + histText },
          { type: "image_url", image_url: { url: dataUri } },
        ]},
      ],
    }),
  });
  const ms = Math.round(performance.now() - t0);
  if (!resp.ok) throw new Error(`HTTP ${resp.status} (${ms}ms): ` + (await resp.text()).slice(0, 200));
  const data = await resp.json();
  const raw = data.choices?.[0]?.message?.content || "";
  return { parsed: tolerantParse(raw), raw, ms };
}

// толерантный парсер: срезать ```json-обёртки, вытащить {...}, при мусоре — null
function tolerantParse(s) {
  try {
    s = s.replace(/```json|```/g, "").trim();
    const m = s.match(/\{[\s\S]*\}/);
    if (!m) return null;
    return JSON.parse(m[0]);
  } catch (e) { return null; }
}

// ===== ОБРАБОТКА ОТВЕТА (общая для тика и одиночного кадра) =====
function handleResult(parsed, raw, ms) {
  if (!parsed || !parsed.instruction) {
    log(`[${ms}ms] мусор в ответе, тик пропущен: ` + raw.slice(0, 120), "err");
    return false;
  }
  speak(parsed.instruction);
  vibrate(parsed.direction, parsed.hazard);
  bigCmd.textContent = parsed.instruction;
  log(`[${ms}ms] ${parsed.instruction} (${parsed.direction}${parsed.hazard ? ", ОПАСНОСТЬ" : ""})`, parsed.hazard ? "haz" : "lat");
  history.push(parsed.instruction);
  if (history.length > 3) history.shift();
  if (parsed.arrived) {
    speak(parsed.instruction + ". Цель достигнута!");
    try { navigator.vibrate && navigator.vibrate([200, 100, 200, 100, 400]); } catch (e) {}
    log("=== ЦЕЛЬ ДОСТИГНУТА ===", "haz");
    stopNav();
  }
  return true;
}

// ===== M3: ЦИКЛ НАВИГАЦИИ — строго один запрос в полёте =====
let navOn = false;
let busy = false;
const btnNav = document.getElementById("btnNav");

function stopNav() {
  navOn = false;
  btnNav.textContent = "Навигация";
  btnNav.classList.remove("stop");
  statusEl.textContent = "";
}

btnNav.onclick = () => {
  if (navOn) { stopNav(); speak("Навигация остановлена"); return; }
  navOn = true;
  history = [];
  btnNav.textContent = "Стоп";
  btnNav.classList.add("stop");
  speak("Навигация запущена");
  tick();
};

async function tick() {
  if (!navOn || busy) return;
  busy = true;
  const frame = captureFrame(); // кадр снимается в момент отправки, не из буфера
  lastFrameEl.src = frame;
  try {
    const { parsed, raw, ms } = await askVLM(frame, MODEL);
    statusEl.textContent = `последний тик: ${ms}ms`;
    handleResult(parsed, raw, ms);
  } catch (e) {
    log("Ошибка тика: " + e.message, "err");
  } finally {
    busy = false;
    if (navOn) setTimeout(tick, TICK_MS);
  }
}

// ===== один кадр (отладка) =====
document.getElementById("btnShot").onclick = async () => {
  const frame = captureFrame();
  lastFrameEl.src = frame;
  statusEl.textContent = "Запрос...";
  try {
    const { parsed, raw, ms } = await askVLM(frame, MODEL);
    statusEl.textContent = "";
    handleResult(parsed, raw, ms);
  } catch (e) {
    statusEl.textContent = "";
    log("Ошибка: " + e.message, "err");
  }
};

// ===== M2: латенси-шутаут — один кадр по всем кандидатам =====
document.getElementById("btnShootout").onclick = async () => {
  const frame = captureFrame();
  lastFrameEl.src = frame;
  log("=== ШУТАУТ: один кадр → " + SHOOTOUT_MODELS.length + " моделей ===");
  for (const m of SHOOTOUT_MODELS) {
    try {
      const { parsed, raw, ms } = await askVLM(frame, m);
      log(`${m}: ${ms}ms → ` + (parsed ? `"${parsed.instruction}"` : "МУСОР: " + raw.slice(0, 80)), "lat");
    } catch (e) {
      log(`${m}: ОШИБКА ` + e.message, "err");
    }
  }
  log("=== шутаут завершён ===");
};
</script>
</body>
</html>
