<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Sentio</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<style>
  /* Sentio — чистый ч/б, SF Pro, макс. контраст = доступность. Логика в <script> не менялась. */
  :root {
    --bg:#fff; --ink:#1d1d1f; --grey:#6e6e73; --faint:#a1a1a6; --line:#d2d2d7; --panel:#f5f5f7;
    --font:-apple-system,BlinkMacSystemFont,"SF Pro Display","Helvetica Neue","Inter",sans-serif;
  }
  * { box-sizing: border-box; }
  /* cursor:pointer — обязателен: iOS Safari не шлёт click в document-делегирование с некликабельных элементов */
  body {
    font-family: var(--font); margin: 0 auto; max-width: 640px; padding: 22px 18px 44px;
    background: var(--bg); color: var(--ink); cursor: pointer; -webkit-font-smoothing: antialiased;
    -webkit-tap-highlight-color: transparent;
  }
  header { display: flex; align-items: center; margin: 2px 0 18px; }
  header svg { height: 34px; width: auto; }
  video { width: 100%; aspect-ratio: 4 / 3; object-fit: cover; max-height: 44vh; background: #000;
    border-radius: 16px; display: block; margin: 4px 0 0; border: 1px solid var(--line); }
  /* живая команда — самый важный элемент, крупно. Пусто → скрыто, чтобы не зияла дыра до старта. */
  #bigCmd { font-size: clamp(28px,7vw,40px); font-weight: 640; letter-spacing: -.02em; line-height: 1.14;
    margin: 18px 0 4px; color: var(--ink); text-wrap: balance; }
  #status { font-size: 15px; color: var(--grey); font-weight: 450; }
  #bigCmd:empty, #status:empty { display: none; }
  label { font-size: 14px; color: var(--grey); display: block; margin: 16px 0 7px; line-height: 1.42; }
  input {
    font: inherit; font-size: 17px; padding: 13px 15px; border-radius: 12px;
    border: 1.5px solid var(--line); background: #fff; color: var(--ink); width: 100%;
    -webkit-appearance: none;
  }
  input:focus { outline: none; border-color: var(--ink); }
  /* кнопки — крупные тач-таргеты, мoно: контур = вторичная, залив = первичная, состояние — контрастом а не цветом */
  button {
    font: inherit; font-size: 17px; font-weight: 560; min-height: 52px; padding: 14px 22px;
    margin: 7px 8px 0 0; border-radius: 13px; border: 1.5px solid var(--ink);
    background: #fff; color: var(--ink); cursor: pointer; -webkit-appearance: none;
    transition: transform .06s ease;
  }
  button:active { transform: scale(.97); }
  button:disabled { border-color: var(--line); color: var(--faint); background: #fff; }
  /* первичная кнопка и mic — на всю ширину, стопкой; чёткая иерархия */
  #btnStart, #btnMic { display: block; width: 100%; margin: 16px 0 0; }
  #btnStart { background: var(--ink); color: #fff; }
  #btnStart:disabled { background: #fff; color: var(--faint); border-color: var(--line); }
  #btnMic { font-size: 17px; margin-top: 10px; }
  #btnMic:disabled { color: var(--faint); border-color: var(--line); }
  button.stop { background: var(--ink); color: #fff; }
  /* слушаем — инверсия в чёрное + пульс (видимое состояние записи без цвета) */
  #btnMic.listening { background: var(--ink); color: #fff; border-color: var(--ink);
    box-shadow: 0 0 0 0 rgba(29,29,31,.4); animation: sentio-pulse 1.4s infinite; }
  @keyframes sentio-pulse { 0%{box-shadow:0 0 0 0 rgba(29,29,31,.4)} 70%{box-shadow:0 0 0 18px rgba(29,29,31,0)} 100%{box-shadow:0 0 0 0 rgba(29,29,31,0)} }
  /* монохромные SVG-иконки вместо эмодзи: маска + currentColor → цвет наследуется от кнопки (ink/белый) */
  #btnMic::before, #btnEars::before { content: ""; display: inline-block; background: currentColor;
    vertical-align: -0.18em; margin-right: 8px; -webkit-mask-repeat: no-repeat; mask-repeat: no-repeat;
    -webkit-mask-position: center; mask-position: center; -webkit-mask-size: contain; mask-size: contain; }
  #btnMic::before { width: 18px; height: 18px;
    -webkit-mask-image: url("data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20viewBox%3D%220%200%2024%2024%22%3E%3Cpath%20d%3D%22M12%202a3%203%200%200%200-3%203v6a3%203%200%200%200%206%200V5a3%203%200%200%200-3-3z%22%2F%3E%3Cpath%20d%3D%22M6%2010a1%201%200%200%201%202%200%204%204%200%200%200%208%200%201%201%200%200%201%202%200%206%206%200%200%201-5%205.91V19h2a1%201%200%201%201%200%202H9a1%201%200%201%201%200-2h2v-3.09A6%206%200%200%201%206%2010z%22%2F%3E%3C%2Fsvg%3E");
    mask-image: url("data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20viewBox%3D%220%200%2024%2024%22%3E%3Cpath%20d%3D%22M12%202a3%203%200%200%200-3%203v6a3%203%200%200%200%206%200V5a3%203%200%200%200-3-3z%22%2F%3E%3Cpath%20d%3D%22M6%2010a1%201%200%200%201%202%200%204%204%200%200%200%208%200%201%201%200%200%201%202%200%206%206%200%200%201-5%205.91V19h2a1%201%200%201%201%200%202H9a1%201%200%201%201%200-2h2v-3.09A6%206%200%200%201%206%2010z%22%2F%3E%3C%2Fsvg%3E"); }
  #btnEars::before { width: 15px; height: 15px; margin-right: 6px; vertical-align: -0.12em;
    -webkit-mask-image: url("data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20viewBox%3D%220%200%2024%2024%22%3E%3Crect%20x%3D%222%22%20y%3D%2210%22%20width%3D%222.4%22%20height%3D%224%22%20rx%3D%221.2%22%2F%3E%3Crect%20x%3D%227%22%20y%3D%227%22%20width%3D%222.4%22%20height%3D%2210%22%20rx%3D%221.2%22%2F%3E%3Crect%20x%3D%2211.8%22%20y%3D%223%22%20width%3D%222.4%22%20height%3D%2218%22%20rx%3D%221.2%22%2F%3E%3Crect%20x%3D%2216.6%22%20y%3D%227%22%20width%3D%222.4%22%20height%3D%2210%22%20rx%3D%221.2%22%2F%3E%3Crect%20x%3D%2221%22%20y%3D%2210%22%20width%3D%222.4%22%20height%3D%224%22%20rx%3D%221.2%22%2F%3E%3C%2Fsvg%3E");
    mask-image: url("data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20viewBox%3D%220%200%2024%2024%22%3E%3Crect%20x%3D%222%22%20y%3D%2210%22%20width%3D%222.4%22%20height%3D%224%22%20rx%3D%221.2%22%2F%3E%3Crect%20x%3D%227%22%20y%3D%227%22%20width%3D%222.4%22%20height%3D%2210%22%20rx%3D%221.2%22%2F%3E%3Crect%20x%3D%2211.8%22%20y%3D%223%22%20width%3D%222.4%22%20height%3D%2218%22%20rx%3D%221.2%22%2F%3E%3Crect%20x%3D%2216.6%22%20y%3D%227%22%20width%3D%222.4%22%20height%3D%2210%22%20rx%3D%221.2%22%2F%3E%3Crect%20x%3D%2221%22%20y%3D%2210%22%20width%3D%222.4%22%20height%3D%224%22%20rx%3D%221.2%22%2F%3E%3C%2Fsvg%3E"); }
  /* дев-кнопки убраны — чистый consumer-вид. Элементы остаются в DOM (JS завязан на их id). */
  details.dev { display: none; }
  details.dev > summary { font-size: 13px; color: var(--faint); cursor: pointer; list-style: none;
    padding: 6px 0; user-select: none; }
  details.dev > summary::-webkit-details-marker { display: none; }
  details.dev > summary::before { content: "▸  "; }
  details.dev[open] > summary::before { content: "▾  "; }
  .dev-row { display: flex; flex-wrap: wrap; gap: 6px; padding-top: 8px; }
  .dev-row button { font-size: 13px; font-weight: 500; min-height: 40px; padding: 8px 14px;
    border-radius: 9px; border: 1px solid var(--line); color: var(--grey); background: #fff; margin: 0; }
  .dev-row button:disabled { color: var(--faint); border-color: var(--line); }
  /* judge view — служебная консоль для зрячих отладчиков */
  #judge { display: flex; gap: 16px; flex-wrap: wrap; margin-top: 22px; padding-top: 18px;
    border-top: 1px solid var(--line); }
  /* judge view пуст до старта → скрываем, чтобы стартовый экран был чистым consumer.
     Появляется сам, когда есть кадр или лог (во время навигации — для судей). */
  #lastFrame:not([src]) { display: none; }
  #judge:not(:has(#log div)):not(:has(#lastFrame[src])) { display: none; }
  #lastFrame { width: 220px; max-width: 100%; border-radius: 12px; background: #000; border: 1px solid var(--line); }
  #log { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 13px; line-height: 1.55;
    flex: 1; min-width: 240px; max-height: 320px; overflow-y: auto; color: var(--grey); }
  #log div { border-bottom: 1px solid var(--line); padding: 4px 0; }
  .lat { color: var(--faint); }
  .err { color: var(--ink); font-weight: 700; }
  .haz { color: var(--ink); font-weight: 700; text-decoration: underline; }
</style>
</head>
<body>
<header><svg viewBox="0 0 392 90" role="img" aria-label="Sentio" xmlns="http://www.w3.org/2000/svg" fill="none">
  <circle cx="20" cy="22" r="7" fill="#e6e6ea"/>
  <circle cx="20" cy="45" r="7" fill="#1d1d1f"/>
  <circle cx="20" cy="68" r="7" fill="#1d1d1f"/>
  <circle cx="44" cy="22" r="7" fill="#1d1d1f"/>
  <circle cx="44" cy="45" r="7" fill="#e6e6ea"/>
  <circle cx="44" cy="68" r="7" fill="#e6e6ea"/>
  <text x="78" y="62" font-family="-apple-system,'SF Pro Display','Helvetica Neue',Arial,sans-serif" font-size="54" font-weight="700" letter-spacing="-2" fill="#1d1d1f">Sentio</text>
</svg></header>
<video id="cam" playsinline autoplay muted aria-hidden="true"></video>

<!-- Живая команда — герой экрана. Пусто до старта → CSS скрывает, чтобы не зияла дыра. -->
<div id="bigCmd"></div>
<div id="status" aria-hidden="true"></div>

<!-- Первичное действие -->
<button id="btnStart" aria-label="Старт камеры и начало описания окружения">Старт камеры</button>

<!-- Цель: коснись экрана и скажи, либо впиши -->
<label for="goal">Коснись экрана и скажи, куда идти — «хочу дойти до …». Или впиши цель ниже. Команды голосом: «стоп», «что вокруг», «быстрее / медленнее».</label>
<input id="goal" value="" placeholder="коснись экрана и скажи цель, или впиши сюда">
<button id="btnMic" disabled aria-label="Сказать цель голосом">Сказать цель</button>

<!-- Служебные кнопки — обычному пользователю не нужны, приложение voice-first -->
<details class="dev" onclick="event.stopPropagation()">
  <summary>Инструменты отладки</summary>
  <div class="dev-row">
    <button id="btnNav" disabled>Навигация</button>
    <button id="btnEars" disabled aria-label="Постоянное прослушивание команд">Слух: вкл</button>
    <button id="btnShot" disabled>Один кадр</button>
    <button id="btnShootout" disabled>Шутаут</button>
  </div>
</details>

<!-- Judge view: что «видит» и «думает» модель — для зрячих отладчиков, скринридеру не нужен -->
<div id="judge" aria-hidden="true">
  <img id="lastFrame" alt="">
  <div id="log"></div>
</div>

<script>
// ===== КОНФИГ =====
// Ключ OpenRouter живёт на сервере (Netlify Function /api/vlm), в браузере его нет.
// выбор пользователя: gemini-3.5-flash (2.4с, человека вплотную видит, дешевле opus)
const MODEL = "google/gemini-3.5-flash";
const SHOOTOUT_MODELS = [
  "google/gemini-3.5-flash",
  "anthropic/claude-opus-4.8-fast",
  "qwen/qwen3-vl-30b-a3b-instruct",
];
const TICK_MS = 250;        // пауза между ответом и следующим кадром (рычаг M4)
const DESCRIBE_TICK_MS = 400; // контур почти непрерывный: речь и запрос идут внахлёст
const FETCH_TIMEOUT = 15000; // зависший запрос не должен останавливать цикл

const cam = document.getElementById("cam");
const logEl = document.getElementById("log");
const statusEl = document.getElementById("status");
const bigCmd = document.getElementById("bigCmd");
const lastFrameEl = document.getElementById("lastFrame");
const goalEl = document.getElementById("goal");
const btnNav = document.getElementById("btnNav");
const btnMic = document.getElementById("btnMic");

function goalText() { return goalEl.value.trim(); }

function log(msg, cls) {
  const d = document.createElement("div");
  if (cls) d.className = cls;
  d.textContent = msg;
  logEl.prepend(d);
  while (logEl.childNodes.length > 60) logEl.removeChild(logEl.lastChild); // DOM не пухнет за долгую сессию
}

// ===== КАМЕРА =====
document.getElementById("btnStart").onclick = async () => {
  // разблокировка TTS СИНХРОННО из жеста: iOS молча дропает все speak() до первого gesture-speak
  try { const u = new SpeechSynthesisUtterance(" "); u.volume = 0; speechSynthesis.speak(u); } catch (e) {}
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: "environment", width: { ideal: 1280 } },
      audio: false,
    });
    cam.srcObject = stream;
    const track = stream.getVideoTracks()[0];
    track.onended = () => { // камеру забрало другое приложение / система
      log("Камера потеряна (трек завершён)", "err");
      speak("Камера потеряна. Перезапустите камеру.");
      stopNav();
      stopCallMic();
      // без камеры голос вести не может — гасим всё, кроме повторного старта камеры
      for (const id of ["btnNav", "btnShot", "btnShootout", "btnMic", "btnEars"]) document.getElementById(id).disabled = true;
    };
    for (const id of ["btnNav", "btnShot", "btnShootout", "btnMic", "btnEars"]) document.getElementById(id).disabled = false;
    log("Камера запущена");
    // сразу описываем окружение: незрячему не нужно искать вторую кнопку
    speak(goalText()
      ? "Камера включена. Веду к цели: " + goalText()
      : "Камера включена. Описываю, что впереди. " +
        (alwaysListen ? "Скажите, куда вести — я слушаю." : "Коснитесь экрана и скажите, куда вести."));
    if (!navOn) startNav(false);
    startCallMic(); // мик открывается один раз и живёт как звонок (жест кнопки ещё активен)
  } catch (e) {
    log("Ошибка камеры: " + e.message, "err");
  }
};

// ===== КАДР: downscale 768px, JPEG 0.6, data-URI =====
const frameCanvas = document.createElement("canvas"); // один canvas на все тики — меньше GC на телефоне
function captureFrame() {
  if (!cam.videoWidth) return null; // метаданные ещё не загружены
  const w = 768;
  const h = Math.round(cam.videoHeight * (w / cam.videoWidth));
  frameCanvas.width = w; frameCanvas.height = h;
  frameCanvas.getContext("2d").drawImage(cam, 0, 0, w, h);
  return frameCanvas.toDataURL("image/jpeg", 0.6);
}

// ===== ГОЛОС =====
let listening = false; // пока слушаем микрофон — молчим, иначе телефон услышит сам себя
let lastU = null;      // глобальная ссылка: GC убивает локальный utterance до озвучки
let pendingSpeak = null; // команда контура, ждущая конца текущей фразы (не рвать речь на полуслове)
let speechEverStarted = false, speechAttempts = 0, muteWarned = false;
let speechRate = 1.2; // голосом: «говори быстрее» / «медленнее»
try { speechRate = Math.min(1.8, Math.max(0.8, parseFloat(localStorage.getItem("povodyr_rate")) || 1.2)); } catch (e) {}
function speakNow(text) {
  const u = new SpeechSynthesisUtterance(text);
  u.lang = "ru-RU";
  u.rate = speechRate;
  u.onstart = () => { speechEverStarted = true; };
  // для эхо-фильтра постоянного слуха: что и когда мы сами сказали
  lastTtsText = text;
  u.onend = () => {
    lastTtsEndAt = performance.now();
    // контур шлёт кадры, не дожидаясь конца речи: свежая команда ждёт здесь своей очереди
    if (pendingSpeak && !listening) {
      const t = pendingSpeak;
      pendingSpeak = null;
      setTimeout(() => { if (!listening && !speechSynthesis.speaking) speakNow(t); }, 60);
    }
  };
  lastU = u;
  speechSynthesis.speak(u);
  speechSynthesis.resume(); // Chrome иногда остаётся в paused после сворачивания
  // сторожок: iOS mute switch глушит speechSynthesis молча — речь единственный канал
  speechAttempts++;
  if (!muteWarned) setTimeout(() => {
    if (!speechEverStarted && speechAttempts >= 2) {
      muteWarned = true;
      bigCmd.textContent = "Речь не слышна? Выключи беззвучный режим!";
      log("РЕЧЬ НЕ ВОСПРОИЗВОДИТСЯ — проверь беззвучный режим и громкость", "err");
    }
  }, 2000);
}
function speak(text) {
  pendingSpeak = null; // прямой speak (опасность/подтверждение) отменяет отложенную команду контура
  if (listening) return;
  try {
    if (speechSynthesis.speaking || speechSynthesis.pending) {
      speechSynthesis.cancel();
      // Android Chrome дропает утеранс, отправленный сразу после cancel()
      setTimeout(() => { if (!listening) speakNow(text); }, 60);
    } else {
      speakNow(text); // первый вызов обязан быть синхронным из user gesture (iOS)
    }
  } catch (e) { /* нет TTS — молчим */ }
}

// ===== ВИБРАЦИЯ (iOS не умеет — молча пропускаем) =====
const VIBES = {
  hazard: [100, 50, 100, 50, 100],
  left: [80],
  right: [80, 60, 80],
  forward: [40],
};
function vibrate(dir, hazard) {
  try {
    if (!navigator.vibrate) return;
    navigator.vibrate(hazard ? VIBES.hazard : (VIBES[dir] || []));
  } catch (e) {}
}

// ===== STT: цель голосом =====
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;

// «я хочу дойти до бутылки» → цель «бутылки»; «стоп» → стоп; «что вокруг» → описание
function parseVoiceCommand(phrase) {
  // iOS STT добавляет пунктуацию («Стоп.») — вычищаем до разбора
  const p = phrase.toLowerCase().replace(/[.,!?…]+/g, " ").replace(/\s+/g, " ").trim();
  // не \b: границы слов в JS-регэкспах не работают с кириллицей
  if (/^(стоп|стой|останови(сь)?|хватит|замолчи|пауза)(\s|$)/.test(p)) return { type: "stop" };
  if (/^(что (впереди|вокруг|там)|опиши|описывай|режим описания)/.test(p)) return { type: "describe" };
  const rm = p.match(/^(?:говори\s+)?(?:по)?(быстрее|медленнее)$/);
  if (rm) return { type: "rate", faster: rm[1] === "быстрее" };
  const m = p.match(/^(?:я\s+)?(?:хочу\s+|мне\s+нужно\s+|надо\s+)?(?:дойти|дойди|подойти|подойди|пойти|пройти|веди|вести|отведи|доведи|найди|найти)(?:\s+меня)?\s*(?:до|к|ко)?\s+(.{2,})$/);
  if (m) return { type: "goal", goal: m[1].trim(), extracted: true };
  // фраза без глагола цели: «пожалуйста стоп» → стоп; длинный подслушанный разговор → переспросить
  if (/(^|\s)(стоп|стой|остановись|хватит)(\s|$)/.test(p)) return { type: "stop" };
  if (p.split(" ").length > 4) return { type: "unclear" };
  return { type: "goal", goal: p, extracted: false };
}

function startListening() {
  if (listening) return; // второй rec.start() поверх первого кидает InvalidStateError
  if (earStream) { tapListen(); return; } // мик уже живёт как звонок — окно из того же потока
  if (!SR || sttMode === "vlm") { startVlmListening(); return; } // резервный канал: аудио → vision-модель
  try { speechSynthesis.cancel(); } catch (e) {}
  listening = true;
  btnMic.classList.add("listening");
  btnMic.textContent = "Слушаю...";
  const rec = new SR();
  rec.lang = "ru-RU";
  rec.interimResults = false;
  rec.maxAlternatives = 1;
  const done = () => {
    listening = false;
    btnMic.classList.remove("listening");
    btnMic.textContent = "Сказать цель";
  };
  rec.onresult = (e) => {
    done();
    const phrase = e.results[0][0].transcript.trim();
    if (!phrase) return;
    handleVoiceCommand(parseVoiceCommand(phrase), phrase);
  };
  rec.onerror = (e) => {
    done();
    log("STT ошибка: " + e.error, "err");
    if (e.error === "no-speech") {
      speak("Не расслышал. Коснитесь экрана и повторите.");
    } else if (e.error !== "aborted") {
      // системный STT сломан (нет диктовки/сервиса) — навсегда переключаемся на резервный канал
      sttMode = "vlm";
      try { localStorage.setItem("povodyr_stt", "vlm"); } catch (e2) {}
      log("Системное распознавание сломано (" + e.error + ") — перехожу на резервное", "err");
      speak("Перехожу на резервное распознавание. Коснитесь экрана и скажите цель.");
    }
  };
  rec.onend = done;
  // rec.start() может бросить синхронно (мик ещё занят фоновой сессией — её stop() асинхронный);
  // без catch тут навсегда залипал listening=true: весь TTS молчал, тики ждали по 20с
  const myAttempt = ++recSeq;
  const tryStart = (n) => {
    if (myAttempt !== recSeq || !listening) return;
    try {
      rec.start();
    } catch (e) {
      if (n < 2) { setTimeout(() => tryStart(n + 1), 300); return; }
      done();
      log("STT не стартовал: " + e.message, "err");
      speak("Микрофон не запустился. Попробуйте ещё раз.");
    }
  };
  tryStart(0);
  // сторожок: если браузер не прислал ни результата, ни ошибки — не держим слух вечно
  setTimeout(() => {
    if (myAttempt === recSeq && listening) {
      try { rec.stop(); } catch (e) {}
      done();
    }
  }, 12000);
}
let recSeq = 0;

// общий обработчик распознанной команды (и для tap-сессии, и для фонового слуха)
function handleVoiceCommand(cmd, phrase) {
  if (cmd.type === "stop") {
    stopNav();
    log("Голос: стоп");
    speak("Остановился. Скажите, куда вести.");
    return;
  }
  if (cmd.type === "unclear") { // подслушанная длинная фраза не должна молча стать целью
    log("Голос: не понял — «" + phrase + "»", "err");
    speak("Не понял. Скажите: хочу дойти до — и назовите цель.");
    return;
  }
  if (cmd.type === "rate") {
    speechRate = Math.min(1.8, Math.max(0.8, speechRate + (cmd.faster ? 0.2 : -0.2)));
    try { localStorage.setItem("povodyr_rate", String(speechRate)); } catch (e) {}
    log("Голос: темп речи " + speechRate.toFixed(1));
    speak(cmd.faster ? "Говорю быстрее" : "Говорю медленнее");
    return;
  }
  if (cmd.type === "describe") {
    goalEl.value = "";
    history = [];
    goalEpoch++;
    lastSpoken = ""; repeatRun = 0; // явная команда — первый ответ не должен глохнуть как «повтор»
    log("Голос: режим описания");
    if (!navOn) startNav(false);
    speak("Описываю, что впереди.");
    return;
  }
  goalEl.value = cmd.goal;
  history = [];
  arrivedStreak = 0;
  goalEpoch++;
  lastSpoken = ""; repeatRun = 0;
  log("Цель (голосом): " + cmd.goal + (cmd.extracted ? " — из фразы: «" + phrase + "»" : ""));
  speak("Веду к цели: " + cmd.goal);
  if (!navOn) startNav(false);
}

// ===== РЕЗЕРВНЫЙ ГОЛОСОВОЙ КАНАЛ: WebAudio → WAV 16кГц → vision-модель расшифровывает =====
// Работает везде, где есть микрофон — не зависит от webkitSpeechRecognition (iOS его ломает)
let sttMode = "sr";
try { sttMode = localStorage.getItem("povodyr_stt") === "vlm" ? "vlm" : "sr"; } catch (e) {}
let audioCtx = null;

function encodeWav(chunks, srcRate) {
  let n = 0;
  for (const c of chunks) n += c.length;
  const all = new Float32Array(n);
  let off = 0;
  for (const c of chunks) { all.set(c, off); off += c.length; }
  const rate = 16000, ratio = srcRate / rate; // даунсэмпл: меньше байтов через прокси
  const out = new Int16Array(Math.floor(all.length / ratio));
  for (let i = 0; i < out.length; i++) {
    const s = all[Math.floor(i * ratio)];
    out[i] = Math.max(-1, Math.min(1, s)) * 0x7fff;
  }
  const buf = new ArrayBuffer(44 + out.length * 2);
  const v = new DataView(buf);
  const wr = (o, s) => { for (let i = 0; i < s.length; i++) v.setUint8(o + i, s.charCodeAt(i)); };
  wr(0, "RIFF"); v.setUint32(4, 36 + out.length * 2, true); wr(8, "WAVEfmt ");
  v.setUint32(16, 16, true); v.setUint16(20, 1, true); v.setUint16(22, 1, true);
  v.setUint32(24, rate, true); v.setUint32(28, rate * 2, true); v.setUint16(32, 2, true);
  v.setUint16(34, 16, true); wr(36, "data"); v.setUint32(40, out.length * 2, true);
  new Int16Array(buf, 44).set(out);
  let bin = "";
  const bytes = new Uint8Array(buf);
  for (let i = 0; i < bytes.length; i += 8192) bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 8192));
  return btoa(bin);
}

async function startVlmListening() {
  if (listening) return;
  try { speechSynthesis.cancel(); } catch (e) {}
  listening = true;
  btnMic.classList.add("listening");
  btnMic.textContent = "Говорите...";
  const done = () => {
    listening = false;
    btnMic.classList.remove("listening");
    btnMic.textContent = "Сказать цель";
  };
  let stream = null, proc = null, src = null;
  try {
    stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    await audioCtx.resume();
    try { navigator.vibrate && navigator.vibrate([40]); } catch (e) {}
    src = audioCtx.createMediaStreamSource(stream);
    proc = audioCtx.createScriptProcessor(4096, 1, 1);
    const chunks = [];
    proc.onaudioprocess = (e) => chunks.push(new Float32Array(e.inputBuffer.getChannelData(0)));
    src.connect(proc);
    proc.connect(audioCtx.destination);
    await new Promise(r => setTimeout(r, 4000)); // окно записи 4 секунды
    proc.disconnect(); src.disconnect();
    stream.getTracks().forEach(t => t.stop()); // отпустить микрофон сразу
    stream = null;
    btnMic.textContent = "Распознаю...";
    const b64 = encodeWav(chunks, audioCtx.sampleRate);
    const resp = await fetch("/api/vlm", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      signal: AbortSignal.timeout(FETCH_TIMEOUT),
      body: JSON.stringify({
        model: MODEL,
        response_format: { type: "json_object" },
        max_tokens: 80,
        messages: [
          { role: "system", content: "В аудио — короткая фраза по-русски (команда навигатора для незрячих). Расшифруй её дословно. Если речи нет — пустая строка. Отвечай ТОЛЬКО JSON: {\"transcript\": string}" },
          { role: "user", content: [
            { type: "text", text: "Расшифруй фразу." },
            { type: "input_audio", input_audio: { data: b64, format: "wav" } },
          ]},
        ],
      }),
    });
    const data = await resp.json();
    const parsed = tolerantParse(data.choices?.[0]?.message?.content || "");
    done();
    const phrase = (parsed && parsed.transcript || "").trim();
    if (!phrase) { speak("Не расслышал. Коснитесь экрана и повторите."); return; }
    log("Голос (резерв): «" + phrase + "»");
    handleVoiceCommand(parseVoiceCommand(phrase), phrase);
  } catch (e) {
    try { if (proc) proc.disconnect(); if (src) src.disconnect(); } catch (e2) {}
    try { if (stream) stream.getTracks().forEach(t => t.stop()); } catch (e2) {}
    done();
    log("Резервный STT: " + e.message, "err");
    speak(e.name === "NotAllowedError"
      ? "Нет доступа к микрофону. Разрешите его в настройках браузера."
      : "Не расслышал, попробуйте ещё раз.");
  }
}

btnMic.onclick = startListening;

// весь экран — кнопка микрофона: незрячему проще хлопнуть по экрану, чем искать кнопку
document.addEventListener("click", (e) => {
  if (e.target.closest("button, input, label, a, #judge")) return; // judge-лог оставляем зрячим
  if (btnMic.disabled) return; // камера ещё не запущена — TTS-подсказки не глушим
  startListening();
});

// ===== ПОСТОЯННЫЙ СЛУХ «КАК В ЗВОНКЕ» =====
// Один аудиопоток открыт ВСЁ время — никаких стартов/стопов аудиосессий (они и лагали телефон).
// Фразы нарезаются из потока по тишине (VAD на RMS), расшифровка — vision-модель через /api/vlm.
// TTS не глушится, поэтому эхо-фильтр: пока говорим сами (+700мс) — сэмплы выбрасываются.
let alwaysListen = true;
try { alwaysListen = localStorage.getItem("povodyr_ears") !== "off"; } catch (e) {}
let lastTtsText = "", lastTtsEndAt = 0;
const btnEars = document.getElementById("btnEars");

function looksLikeEcho(phrase) {
  // больше половины значимых слов совпало с последней озвученной фразой — это эхо.
  // пунктуацию чистим с ОБЕИХ сторон: «стоп,» ≠ «стоп» ломало фильтр (ревью 2026-07-08)
  const norm = (s) => s.toLowerCase().replace(/[.,!?…«»]+/g, " ").split(/\s+/).filter(Boolean);
  const pw = norm(phrase).filter(w => w.length > 3);
  const tw = new Set(norm(lastTtsText));
  return pw.length > 0 && pw.filter(w => tw.has(w)).length / pw.length > 0.5;
}

let earStream = null, earCtx = null, earSrc = null, earProc = null;
let earSeg = [], earPre = [], earVoiced = false, earVoicedMs = 0, earSilenceMs = 0;
let sttBusy = false;
let tapBuf = null; // окно принудительной записи после касания (свободная фраза разрешена)

const VAD_RMS = 0.02;     // порог голоса
const VAD_END_MS = 800;   // тишина, завершающая фразу
const VAD_MIN_MS = 350;   // короче — щелчок/шум, не речь
const VAD_MAX_MS = 8000;  // принудительная отсечка

async function startCallMic() {
  if (earStream || !alwaysListen) return;
  try {
    earStream = await navigator.mediaDevices.getUserMedia({
      audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true },
    });
  } catch (e) {
    alwaysListen = false;
    updateEarsBtn();
    log("Слух не включился: " + e.name, "err");
    speak("Микрофон недоступен. Коснитесь экрана, чтобы сказать цель.");
    return;
  }
  const track = earStream.getAudioTracks()[0];
  if (track) track.onended = () => { stopCallMic(); }; // систему убило мик — оживим на visible
  if (!earCtx) earCtx = new (window.AudioContext || window.webkitAudioContext)();
  try { await earCtx.resume(); } catch (e) {}
  earSrc = earCtx.createMediaStreamSource(earStream);
  earProc = earCtx.createScriptProcessor(4096, 1, 1);
  earProc.onaudioprocess = onEarAudio;
  earSrc.connect(earProc);
  earProc.connect(earCtx.destination);
  log("🎙 Слух включён: микрофон работает постоянно, как в звонке");
}

function stopCallMic() {
  try { if (earProc) { earProc.onaudioprocess = null; earProc.disconnect(); } } catch (e) {}
  try { if (earSrc) earSrc.disconnect(); } catch (e) {}
  try { if (earStream) earStream.getTracks().forEach(t => t.stop()); } catch (e) {}
  earStream = null; earSrc = null; earProc = null;
  earSeg = []; earPre = []; earVoiced = false; earVoicedMs = 0; earSilenceMs = 0; tapBuf = null;
}

function onEarAudio(e) {
  const data = e.inputBuffer.getChannelData(0);
  const blockMs = (data.length / earCtx.sampleRate) * 1000;
  if (tapBuf) { tapBuf.push(new Float32Array(data)); return; } // окно касания пишет всё подряд
  // пока говорим сами (и чуть после) — глухи: телефон не должен слышать сам себя
  if (listening || speechSynthesis.speaking || performance.now() - lastTtsEndAt < 700) {
    earSeg = []; earVoiced = false; earVoicedMs = 0;
    return;
  }
  let sum = 0;
  for (let i = 0; i < data.length; i += 4) sum += data[i] * data[i];
  const rms = Math.sqrt(sum / (data.length / 4));
  if (rms > VAD_RMS) {
    if (!earVoiced) { earSeg = earPre.slice(); earVoiced = true; earVoicedMs = 0; } // прероллинг: не резать начало слова
    earSeg.push(new Float32Array(data));
    earVoicedMs += blockMs;
    earSilenceMs = 0;
    if (earVoicedMs > VAD_MAX_MS) finishSegment();
  } else {
    if (earVoiced) {
      earSeg.push(new Float32Array(data));
      earSilenceMs += blockMs;
      if (earSilenceMs > VAD_END_MS) finishSegment();
    } else {
      earPre.push(new Float32Array(data));
      if (earPre.length > 3) earPre.shift();
    }
  }
}

function finishSegment() {
  const seg = earSeg, vm = earVoicedMs;
  earSeg = []; earVoiced = false; earVoicedMs = 0; earSilenceMs = 0;
  if (vm < VAD_MIN_MS) return;
  if (sttBusy) { log("🎙 фраза пропущена: распознаю предыдущую"); return; }
  transcribeSegment(seg, false);
}

async function transcribeSegment(chunks, allowFree) {
  sttBusy = true;
  try {
    const b64 = encodeWav(chunks, earCtx.sampleRate);
    const resp = await fetch("/api/vlm", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      signal: AbortSignal.timeout(FETCH_TIMEOUT),
      body: JSON.stringify({
        model: MODEL,
        response_format: { type: "json_object" },
        max_tokens: 80,
        messages: [
          { role: "system", content: "В аудио — короткая фраза по-русски (команда навигатора для незрячих). Расшифруй её дословно. Если внятной речи нет — пустая строка. Отвечай ТОЛЬКО JSON: {\"transcript\": string}" },
          { role: "user", content: [
            { type: "text", text: "Расшифруй фразу." },
            { type: "input_audio", input_audio: { data: b64, format: "wav" } },
          ]},
        ],
      }),
    });
    const data = await resp.json();
    const parsed = tolerantParse(data.choices?.[0]?.message?.content || "");
    const phrase = (parsed && parsed.transcript || "").trim();
    if (!phrase) {
      if (allowFree) speak("Не расслышал. Коснитесь экрана и повторите.");
      return;
    }
    if (!allowFree && looksLikeEcho(phrase)) { log("🎙 эхо: «" + phrase + "»"); return; }
    const cmd = parseVoiceCommand(phrase);
    // фоновый слух действует только на УВЕРЕННЫЕ команды; свободная фраза — через касание
    if (!allowFree && (cmd.type === "unclear" || (cmd.type === "goal" && !cmd.extracted))) {
      log("🎙 фон: «" + phrase + "»");
      return;
    }
    log("🎙 услышал: «" + phrase + "»");
    handleVoiceCommand(cmd, phrase);
  } catch (e) {
    log("Слух: ошибка расшифровки: " + e.message, "err");
    if (allowFree) speak("Не расслышал, попробуйте ещё раз.");
  } finally {
    sttBusy = false;
  }
}

// касание при живом мике: НЕ создаём новую аудиосессию — пишем 4с из того же потока
function tapListen() {
  if (listening) return;
  try { speechSynthesis.cancel(); } catch (e) {}
  listening = true;
  btnMic.classList.add("listening");
  btnMic.textContent = "Говорите...";
  try { navigator.vibrate && navigator.vibrate([40]); } catch (e) {}
  tapBuf = [];
  setTimeout(() => {
    const seg = tapBuf;
    tapBuf = null;
    listening = false;
    btnMic.classList.remove("listening");
    btnMic.textContent = "Сказать цель";
    if (seg && seg.length) transcribeSegment(seg, true);
  }, 4000);
}

function updateEarsBtn() {
  btnEars.textContent = alwaysListen ? "Слух: вкл" : "Слух: выкл";
}
btnEars.onclick = () => {
  alwaysListen = !alwaysListen;
  try { localStorage.setItem("povodyr_ears", alwaysListen ? "on" : "off"); } catch (e) {}
  updateEarsBtn();
  if (alwaysListen) { startCallMic(); speak("Слух включён. Говорите в любой момент."); }
  else { stopCallMic(); speak("Слух выключен. Коснитесь экрана, чтобы сказать цель."); }
};
updateEarsBtn();

goalEl.addEventListener("change", () => {
  history = [];
  arrivedStreak = 0; // недобранный arrived старой цели не должен засчитаться новой
  goalEpoch++;
  lastSpoken = ""; repeatRun = 0;
  log("Цель изменена: " + (goalText() || "(пусто — режим описания)"));
});

// ===== VLM-ЗАПРОС (через серверный прокси /api/vlm) =====
let history = []; // последние 3 инструкции — против осцилляции лево/право

// оба промпта — победители шутаута 2026-07-08 (3 варианта desc, 2 nav, 4 кадра, 3 судьи):
// только эти дали stop+hazard на лестнице вниз; проигравшие вели «вперёд осторожно» в препятствие
function systemPrompt() {
  const goal = goalText();
  if (!goal) {
    return `Ты — глаза незрячего пешехода. Телефон висит у него на груди, камера смотрит вперёд, он медленно идёт. ` +
      `Одной короткой фразой по-русски (максимум 12 слов) скажи самое важное для его СЛЕДУЮЩЕГО ШАГА, по приоритету: ` +
      `1) реальная опасность в 1-3 шагах на пути (ступени, яма, машина, кабель, человек вплотную) — hazard=true и direction="stop"; ` +
      `2) препятствие в 1-5 шагах и с какой стороны его обойти; 3) свободный проход — куда идти; ` +
      `4) читаемая вывеска или табличка прямо по курсу — прочитай её текст точно. ` +
      `ВСЕГДА оценивай дистанцию в шагах (один шаг — примерно 0.7 метра). ` +
      `Далёкое (больше 10 шагов), за стеклом или в другой комнате — не препятствие: упоминай фоном с hazard=false. ` +
      `hazard=true ТОЛЬКО для непосредственной угрозы в паре шагов, не для фона. ` +
      `Смотри на текущую сцену свежим взглядом: прошлые фразы даны, только чтобы НЕ повторять их дословно — ` +
      `если сцена та же, дай новую деталь или уточни дистанцию. ` +
      `Говори о мире, а не о картинке: запрещены слова «изображение», «кадр», «фото», «вижу». Не уверен в стороне — не выдумывай её. ` +
      `Отвечай ТОЛЬКО JSON ровно с четырьмя полями: {"instruction": string, "direction": "forward"|"left"|"right"|"stop", "hazard": bool, "arrived": false}`;
  }
  return `Ты — навигатор незрячего пешехода. Телефон на его груди, камера смотрит вперёд, он идёт медленно. ` +
    `Цель: «${goal}». Одна команда по-русски, максимум 8 слов, приоритет: ` +
    `1) опасность на пути (ступени, яма, препятствие вплотную) — hazard=true, direction="stop", скажи что и где; ` +
    `2) цель видна — направление и число шагов к ней; ` +
    `3) цель НЕ видна — команда поворота для поиска («поворачивайся направо») и direction в сторону поворота. ` +
    `Шаги оценивай честно: один шаг — примерно 0.7 метра. Если командуешь stop — ставь hazard=true. ` +
    `Говори о мире, не о картинке: запрещены «изображение», «кадр», «вижу». ` +
    `arrived=true СТРОГО когда цель прямо перед грудью, занимает большую часть обзора, до неё меньше шага. ` +
    `Отвечай ТОЛЬКО JSON ровно с четырьмя полями: {"instruction": string, "direction": "forward"|"left"|"right"|"stop", "hazard": bool, "arrived": bool}`;
}

async function askVLM(dataUri, model) {
  const t0 = performance.now();
  const histText = history.length ? ` Предыдущие команды (свежие последними): ${history.join("; ")}.` : "";
  const resp = await fetch("/api/vlm", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    signal: AbortSignal.timeout(FETCH_TIMEOUT),
    body: JSON.stringify({
      model: model,
      response_format: { type: "json_object" },
      max_tokens: 160, // 100 не хватало моделям с markdown-обёрткой — JSON обрезался, тик терялся
      messages: [
        { role: "system", content: systemPrompt() },
        { role: "user", content: [
          { type: "text", text: "Кадр с камеры. Команда?" + histText },
          { type: "image_url", image_url: { url: dataUri } },
        ]},
      ],
    }),
  });
  const ms = Math.round(performance.now() - t0);
  if (!resp.ok) throw new Error(`HTTP ${resp.status} (${ms}ms): ` + (await resp.text()).slice(0, 200));
  const data = await resp.json();
  const raw = data.choices?.[0]?.message?.content || "";
  return { parsed: tolerantParse(raw), raw, ms };
}

// толерантный парсер: срезать ```json-обёртки, вытащить {...}, при мусоре — null
function tolerantParse(s) {
  try {
    s = s.replace(/```json|```/g, "").trim();
    const m = s.match(/\{[\s\S]*\}/);
    if (!m) return null;
    return JSON.parse(m[0]);
  } catch (e) { return null; }
}

// ===== ОБРАБОТКА ОТВЕТА (общая для тика и одиночного кадра) =====
let lastSpoken = "", repeatRun = 0; // дословные повторы модели не долбим в уши каждый тик
function handleResult(parsed, raw, ms) {
  if (!parsed || !parsed.instruction) {
    log(`[${ms}ms] мусор в ответе, тик пропущен: ` + raw.slice(0, 120), "err");
    return false;
  }
  const isRepeat = parsed.instruction === lastSpoken;
  repeatRun = isRepeat ? repeatRun + 1 : 0;
  lastSpoken = parsed.instruction;
  vibrate(parsed.direction, parsed.hazard); // вибрация — канал безопасности, её не подавляем
  bigCmd.textContent = parsed.instruction;
  if (isRepeat && repeatRun % 3 !== 0 && !parsed.hazard) {
    // ту же фразу озвучиваем лишь каждый третий раз — но ОПАСНОСТЬ звучит всегда:
    // на iOS вибрации нет, тишина при hazard читается как «путь свободен» (ревью)
    log(`[${ms}ms] повтор подавлен: ${parsed.instruction}`, "lat");
  } else {
    // опасность перебивает текущую фразу сразу; обычная команда ждёт её конца в pendingSpeak
    if (parsed.hazard || (!speechSynthesis.speaking && !speechSynthesis.pending)) {
      pendingSpeak = null;
      speak(parsed.instruction);
    } else {
      pendingSpeak = parsed.instruction;
    }
    log(`[${ms}ms] ${parsed.instruction} (${parsed.direction}${parsed.hazard ? ", ОПАСНОСТЬ" : ""})`, parsed.hazard ? "haz" : "lat");
  }
  if (!isRepeat) { // history — только уникальные фразы, дубли не вытесняют контекст
    history.push(parsed.instruction);
    if (history.length > 3) history.shift();
  }
  if (parsed.arrived && goalText()) {
    arrivedStreak++;
    if (arrivedStreak >= 2) { // один ложный arrived не должен ронять навигацию
      try { navigator.vibrate && navigator.vibrate([200, 100, 200, 100, 400]); } catch (e) {}
      log("=== ЦЕЛЬ ДОСТИГНУТА ===", "haz");
      // цикл не останавливаем: возвращаемся к описанию окружения
      goalEl.value = "";
      history = [];
      arrivedStreak = 0;
      goalEpoch++;
      lastSpoken = ""; repeatRun = 0;
      speak("Цель достигнута! Описываю, что впереди.");
    }
  } else {
    arrivedStreak = 0;
  }
  return true;
}

// ===== WAKE LOCK: экран не должен гаснуть, пока телефон на груди =====
async function keepAwake() {
  try { await navigator.wakeLock.request("screen"); } catch (e) {}
}
document.addEventListener("visibilitychange", () => {
  if (document.visibilityState === "visible") {
    if (navOn) keepAwake();
    try { cam.play(); } catch (e) {} // страховка от замороженного видео после сворачивания
    // мик-звонок мог быть убит системой в фоне — оживляем
    try { earCtx && earCtx.resume(); } catch (e) {}
    if (alwaysListen && !btnMic.disabled) startCallMic();
  }
});

// ===== ЦИКЛ НАВИГАЦИИ — строго один запрос в полёте =====
let navOn = false;
let busy = false;
let errStreak = 0;     // подряд неудачных тиков: с 2-го — голосом «остановитесь»
let arrivedStreak = 0; // arrived подтверждаем двумя тиками подряд
let navEpoch = 0;      // поколение цикла: рестарт убивает тики прошлого поколения (не «два в полёте»)
let goalEpoch = 0;     // поколение цели: ответ, отправленный со старой целью, не озвучивается

function stopNav() {
  navOn = false;
  btnNav.textContent = "Навигация";
  btnNav.classList.remove("stop");
  statusEl.textContent = "";
}

function startNav(announce = true) {
  navOn = true;
  navEpoch++;  // тики прошлого запуска, ещё висящие в полёте, отбрасываются
  busy = false; // страховка от залипшего флага
  history = [];
  errStreak = 0;
  arrivedStreak = 0;
  lastSpoken = ""; repeatRun = 0;
  btnNav.textContent = "Стоп";
  btnNav.classList.add("stop");
  if (announce) speak(goalText() ? "Навигация запущена" : "Описываю, что впереди");
  keepAwake();
  scheduleNext(300); // не сразу tick(): дать вступительной фразе начаться, чтобы её не оборвал ответ
}

btnNav.onclick = () => {
  if (navOn) { stopNav(); speak("Навигация остановлена"); return; }
  startNav();
};

// следующий тик — после короткой паузы; речь НЕ ждём (кадр уходит во время озвучки,
// свежая команда встаёт в pendingSpeak). Ждём только прослушку — не терять команду юзера
function scheduleNext(delay) {
  let waited = 0;
  const next = () => {
    if (!navOn || busy) return;
    if (listening && waited < 20000) {
      waited += 150;
      setTimeout(next, 150);
      return;
    }
    tick();
  };
  setTimeout(next, delay);
}

async function tick() {
  if (!navOn || busy) return;
  busy = true;
  const myNav = navEpoch, myGoal = goalEpoch; // снимок поколений на момент отправки
  try {
    const frame = captureFrame(); // кадр снимается в момент отправки, не из буфера
    if (!frame) return;           // видео ещё не готово — finally перепланирует
    lastFrameEl.src = frame;
    const { parsed, raw, ms } = await askVLM(frame, MODEL);
    if (myNav !== navEpoch) return; // навигацию перезапустили — тик чужого поколения умирает молча
    errStreak = 0;
    if (!navOn) return; // «Стоп» нажали, пока запрос был в полёте — не озвучивать
    if (myGoal !== goalEpoch) { // цель сменили в полёте — команда старой цели не озвучивается
      log(`[${ms}ms] ответ по старой цели отброшен`);
      return;
    }
    statusEl.textContent = `последний тик: ${ms}ms`;
    handleResult(parsed, raw, ms);
  } catch (e) {
    if (myNav !== navEpoch) return; // ошибка чужого поколения не трогает errStreak нового
    errStreak++;
    log(`Ошибка тика (${errStreak} подряд): ` + e.message, "err");
    if (errStreak === 2 || errStreak === 10) {
      speak("Связь потеряна. Остановитесь.");
      try { navigator.vibrate && navigator.vibrate(VIBES.hazard); } catch (e2) {}
    }
  } finally {
    if (myNav === navEpoch) { // busy и планирование принадлежат текущему поколению цикла
      busy = false;
      if (navOn) scheduleNext(errStreak ? 2000 : (goalText() ? TICK_MS : DESCRIBE_TICK_MS));
    }
  }
}

// ===== один кадр (отладка) =====
document.getElementById("btnShot").onclick = async () => {
  if (navOn || busy) { log("Занято: идёт навигация", "err"); return; } // не ломать «один запрос в полёте»
  const frame = captureFrame();
  if (!frame) { log("Видео ещё не готово", "err"); return; }
  lastFrameEl.src = frame;
  statusEl.textContent = "Запрос...";
  try {
    const { parsed, raw, ms } = await askVLM(frame, MODEL);
    statusEl.textContent = "";
    handleResult(parsed, raw, ms);
  } catch (e) {
    statusEl.textContent = "";
    log("Ошибка: " + e.message, "err");
  }
};

// ===== M2: латенси-шутаут — один кадр по всем кандидатам =====
document.getElementById("btnShootout").onclick = async () => {
  if (navOn || busy) { log("Занято: идёт навигация", "err"); return; }
  const frame = captureFrame();
  if (!frame) { log("Видео ещё не готово", "err"); return; }
  lastFrameEl.src = frame;
  log("=== ШУТАУТ: один кадр → " + SHOOTOUT_MODELS.length + " моделей ===");
  for (const m of SHOOTOUT_MODELS) {
    try {
      const { parsed, raw, ms } = await askVLM(frame, m);
      log(`${m}: ${ms}ms → ` + (parsed ? `"${parsed.instruction}"` : "МУСОР: " + raw.slice(0, 80)), "lat");
    } catch (e) {
      log(`${m}: ОШИБКА ` + e.message, "err");
    }
  }
  log("=== шутаут завершён ===");
};
</script>
